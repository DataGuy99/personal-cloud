# /opt/copyparty/config/copyparty.conf
# NOTE: This is a reference template. The live config is generated by
# setup/bootstrap.sh step 10 with real passwords. Edit there, not here.
# Passwords are plaintext (copyparty default); file is chmod 600 root-only.

[global]
  p: 3923
  e2dsa
  e2ts

[accounts]
  alice: CHANGEME
  bob: CHANGEME
  sil: CHANGEME
  guest: CHANGEME

[/vault/alice]
  /users/alice/private
  accs:
    rwmd: alice
[/vault/bob]
  /users/bob/private
  accs:
    rwmd: bob
[/vault/sil]
  /users/sil/private
  accs:
    rwmd: sil
[/shared/work]
  /shares/alice-bob-work
  accs:
    rwmd: alice
    rw: bob
[/shared/baking]
  /shares/alice-sil-baking
  accs:
    rwmd: alice
    rw: sil
[/public/movies]
  /storage/pool/movies
  accs:
    r: *
[/public/tv]
  /storage/pool/tv
  accs:
    r: *
[/public/music]
  /storage/pool/music
  accs:
    r: *
[/public/photos]
  /storage/pool/photos
  accs:
    r: *
[/drop]
  /incoming/anonymous
  accs:
    w: *
