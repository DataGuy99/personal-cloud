# /opt/copyparty/config/copyparty.conf
# Generate password hashes: python3 copyparty-sfx.py -hp mypassword

[global]
  p: 80
  html: /opt/copyparty/custom-ui

[accounts]
  alice: $2b$12$PLACEHOLDER
  bob: $2b$12$PLACEHOLDER
  sil: $2b$12$PLACEHOLDER
  guest: $2b$12$PLACEHOLDER

[/vault/alice]
  /users/alice/private
  accs:
    rwmd: alice

[/vault/bob]
  /users/bob/private
  accs:
    rwmd: bob

[/vault/sil]
  /users/sil/private
  accs:
    rwmd: sil

[/shared/work]
  /shares/alice-bob-work
  accs:
    rwmd: alice
    rw: bob

[/shared/baking]
  /shares/alice-sil-baking
  accs:
    rwmd: alice
    rw: sil

[/public/movies]
  /pool/movies
  accs:
    r: *

[/public/tv]
  /pool/tv
  accs:
    r: *

[/public/music]
  /pool/music
  accs:
    r: *

[/public/photos]
  /pool/photos
  accs:
    r: *

[/drop]
  /incoming/anonymous
  accs:
    w: *
